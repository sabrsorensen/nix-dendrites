repos:
  - repo: local
    hooks:
      - id: write-flake
        name: Regenerate flake.nix
        entry: nix run .#write-flake
        language: system
        pass_filenames: false
      - id: flake-check
        name: Run nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
